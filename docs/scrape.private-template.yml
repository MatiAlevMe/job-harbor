name: Daily Job Scrape (PRIVATE)

# ⚠️  Este workflow NO debe vivir en el repo público.
#    Cópialo a un repo PRIVADO (ej: job-harbor-scraper) para que el
#    daily scrape y los resultados NO sean visibles públicamente.
#
#    Pasos manuales en GitHub:
#    1. Crear repo privado (ej: MatiAlevMe/job-harbor-scraper)
#    2. Subir este archivo a .github/workflows/scrape.yml en el repo PRIVADO
#    3. Settings > Secrets and variables > Actions > agregar:
#         - GEMINI_API_KEY   (de https://aistudio.google.com/apikey)
#         - JOOBLE_API_KEY    (de https://jooble.org/api/about)
#         - GH_PAT           (token con solo public_repo o repo scope)
#    4. El cron se hereda de aquí (Lun-Vie 9:00 AM Chile)

on:
  schedule:
    # 9:00 AM Chile (UTC-4 winter) = 13:00 UTC; backup at 10:00 AM = 14:00 UTC
    - cron: '0 13 * * 1-5'
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      llm:
        description: 'Use LLM matcher (gemini/none)'
        required: true
        default: 'gemini'
        type: choice
        options:
          - gemini
          - none

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout job-harbor (código público)
        uses: actions/checkout@v4
        with:
          repository: MatiAlevMe/job-harbor
          path: job-harbor

      - name: Checkout guia-laboral (perfil)
        uses: actions/checkout@v4
        with:
          repository: MatiAlevMe/guia-laboral
          path: guia-laboral
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: job-harbor
        run: pip install -e .

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: job-harbor/jobs.db
          key: jobs-db

      - name: Run job harbor
        working-directory: job-harbor
        env:
          GUIA_LABORAL_PATH: ${{ github.workspace }}/guia-laboral
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        run: python -m job_harbor run --llm gemini

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: job-results
          path: job-harbor/jobs.db
          retention-days: 30

      - name: Create summary
        working-directory: job-harbor
        run: |
          echo "## Job Harbor Results" >> $GITHUB_STEP_SUMMARY
          python -c "
          import sqlite3, datetime
          conn = sqlite3.connect('jobs.db')
          rows = conn.execute(
              'SELECT title, company, match_score, url, salary_range, posted_date FROM jobs WHERE match_score >= 30 ORDER BY match_score DESC LIMIT 15'
          ).fetchall()
          if rows:
              for r in rows:
                  title, company, score, url, salary, posted = r[0], r[1], r[2], r[3], r[4], r[5]
                  extras = []
                  if salary:
                      extras.append(f'S:{salary}')
                  if posted:
                      try:
                          dt = datetime.datetime.strptime(str(posted)[:10], '%Y-%m-%d')
                          days = (datetime.datetime.now() - dt).days
                          extras.append(f'{days}d')
                      except Exception:
                          pass
                  label = ' [' + ', '.join(extras) + ']' if extras else ''
                  print(f'- [{score:.0f}%]{label} {company} — {title}')
                  if url:
                      print(f'  {url}')
          else:
              print('No matches found above threshold.')
          conn.close()
          " >> $GITHUB_STEP_SUMMARY
